<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FATBOK TV | GİRİŞ</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000b18; /* Neon Koyu Mavi Derinlik */
            --neon-blue: #00f2ff;
            --glass: rgba(0, 242, 255, 0.03);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* Arka Plan Modernist Işık Oyunları */
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, #001f3f 0%, transparent 50%);
            animation: pulseBg 8s infinite alternate;
            z-index: -1;
        }

        /* Üst Başlık - GÜNCEL ADRES İÇİN TIKLAYIN */
        .header-text {
            color: #ffffff;
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 10px;
            text-transform: uppercase;
            margin-bottom: 40px;
            text-align: center;
            opacity: 0.8;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.3));
        }

        /* DEVASA FATBOK TV BUTONU */
        .main-button {
            position: relative;
            background: var(--glass);
            color: var(--neon-blue);
            text-decoration: none;
            padding: 40px 100px;
            font-size: 4.5rem; /* Devasa boyut */
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 15px;
            border: 2px solid var(--neon-blue);
            border-radius: 20px;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.1), inset 0 0 20px rgba(0, 242, 255, 0.1);
        }

        .main-button:hover {
            transform: scale(1.05) translateY(-10px);
            background: var(--neon-blue);
            color: var(--bg-color);
            box-shadow: 0 0 80px rgba(0, 242, 255, 0.6);
            letter-spacing: 20px;
        }

        /* Alt Durum Yazısı */
        .footer-status {
            margin-top: 50px;
            color: rgba(255, 255, 255, 0.2);
            font-size: 1.2rem;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        .footer-status span {
            color: #00ff88;
            font-weight: 800;
        }

        /* Animasyonlar */
        @keyframes pulseBg {
            from { transform: scale(1); opacity: 0.5; }
            to { transform: scale(1.2); opacity: 0.8; }
        }

        /* Mobil Uyumluluk */
        @media (max-width: 768px) {
            .header-text { font-size: 1.2rem; letter-spacing: 5px; }
            .main-button { font-size: 2rem; padding: 25px 40px; letter-spacing: 5px; }
        }
    </style>
</head>
<body>

    <h1 class="header-text">GÜNCEL ADRES İÇİN TIKLAYIN</h1>

    <a href="https://fatboktv1.vercel.app/" class="main-button">
        FATBOK TV
    </a>

    <p class="footer-status">SUNUCU DURUMU: <span>AKTİF</span></p>

</body>
</html>
