<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE GLITCH | ACCESS</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a1a;
            --accent: #ff0055; /* Neon Kırmızı/Pembe */
            --accent-rgb: 255, 0, 85;
            --text: #00ffff; /* Neon Turkuaz */
            --text-dim: #00aaaa;
            --scanlines: repeating-linear-gradient(to bottom, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.03) 1px, transparent 1px, transparent 2px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'VT323', monospace; /* Retro-terminal fontu */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
            position: relative;
        }

        /* Arka Plan Efekti */
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: var(--scanlines), 
                              radial-gradient(circle at center, transparent 0%, var(--bg) 90%);
            z-index: -2;
            animation: flicker 0.15s infinite;
        }

        /* "The Glitch" Efekti (Retro-fütüristik Logo) */
        .glitch-wrapper {
            position: relative;
            margin-bottom: 50px;
        }

        .glitch-logo {
            font-size: 5rem;
            font-weight: 800;
            letter-spacing: -5px;
            color: var(--accent);
            text-transform: uppercase;
            position: relative;
            animation: text-flicker 3s infinite;
        }

        .glitch-logo::before, .glitch-logo::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .glitch-logo::before {
            left: 2px;
            text-shadow: -2px 0 var(--text);
            clip-path: polygon(0 0, 100% 0, 100% 45%, 0 45%);
            animation: glitch-anim-1 2s infinite linear alternate-reverse;
        }

        .glitch-logo::after {
            left: -2px;
            text-shadow: 2px 0 #00ff00; /* Klasik yeşil glitch */
            clip-path: polygon(0 80%, 100% 80%, 100% 100%, 0 100%);
            animation: glitch-anim-2 3s infinite linear alternate-reverse;
        }

        /* Kaotik Alt Metin */
        .status-wrapper {
            background: rgba(var(--accent-rgb), 0.1);
            border: 1px solid var(--accent);
            padding: 10px 20px;
            border-radius: 4px;
            margin-bottom: 60px;
            display: inline-block;
            box-shadow: 0 0 15px rgba(var(--accent-rgb), 0.3);
        }

        .status-line {
            display: block;
            font-size: 1rem;
            color: var(--text-dim);
            margin-bottom: 5px;
        }

        .status-line span {
            color: var(--accent);
            animation: heartbeat 1.5s infinite;
        }

        /* "Hacked" Giriş Butonu */
        .access-btn {
            background: var(--text); /* Neon Turkuaz */
            color: var(--bg);
            padding: 15px 40px;
            border-radius: 4px;
            text-decoration: none;
            font-weight: 800;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            position: relative;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.4);
        }

        .access-btn:hover {
            background: transparent;
            color: var(--text);
            border: 2px solid var(--text);
            transform: translateY(-5px);
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.7);
        }

        /* Neon Tıklama Efekti */
        .access-btn::after {
            content: '';
            position: absolute;
            inset: -5px;
            border: 1px solid var(--text);
            opacity: 0;
            transition: 0.2s;
        }

        .access-btn:hover::after {
            opacity: 1;
            transform: scale(1.1);
        }

        /* Kaotik Footer */
        .footer-glitch {
            position: absolute;
            bottom: 20px;
            font-size: 0.75rem;
            color: #333; /* Çok sönük */
            font-family: monospace;
            text-transform: lowercase;
            width: 100%;
            text-align: center;
        }

        /* --- ANIMASYONLAR (Sınırları Zorlayan Kısım) --- */

        @keyframes flicker {
            0% { opacity: 0.97; }
            5% { opacity: 0.95; }
            10% { opacity: 0.9; }
            15% { opacity: 0.95; }
            20% { opacity: 0.98; }
            100% { opacity: 1; }
        }

        @keyframes text-flicker {
            0% { opacity: 1; }
            50% { opacity: 0.9; }
            52% { opacity: 1; }
            70% { opacity: 0.95; }
            72% { opacity: 1; }
            100% { opacity: 0.9; }
        }

        @keyframes heartbeat {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        /* Glitch Hareketleri */
        @keyframes glitch-anim-1 {
            0% { clip-path: polygon(0 0, 100% 0, 100% 45%, 0 45%); }
            10% { clip-path: polygon(0 15%, 100% 15%, 100% 60%, 0 60%); }
            20% { clip-path: polygon(0 5%, 100% 5%, 100% 50%, 0 50%); }
            100% { clip-path: polygon(0 0, 100% 0, 100% 45%, 0 45%); }
        }

        @keyframes glitch-anim-2 {
            0% { clip-path: polygon(0 80%, 100% 80%, 100% 100%, 0 100%); }
            5% { clip-path: polygon(0 65%, 100% 65%, 100% 85%, 0 85%); }
            15% { clip-path: polygon(0 75%, 100% 75%, 100% 95%, 0 95%); }
            100% { clip-path: polygon(0 80%, 100% 80%, 100% 100%, 0 100%); }
        }

    </style>
</head>
<body>

    <div class="glitch-wrapper">
        <div class="glitch-logo" data-text="FATBOK">FATBOK</div>
    </div>

    <div class="status-wrapper">
        <span class="status-line">> INIT_LINK... [OK]</span>
        <span class="status-line">> SEC_PROTOCOL... <span>ENABLED</span></span>
        <span class="status-line">> NETLIFY_NODE... ACTIVE</span>
    </div>

    <a href="https://fatboktv.netlify.app" class="access-btn">
        ACCESS CORE
    </a>

    <div class="footer-glitch">
        // CREXOWW & FATBOK // SYSTEM_HACKED // [SYS_0911] // DO_NOT_TRACE
    </div>

</body>
</html>
