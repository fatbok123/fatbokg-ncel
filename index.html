<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FATBOK TV | GİRİŞ</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050508;
            --accent: #00ffff; /* Neon Turkuaz */
            --text: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Arka Plan Hafif Efekt */
        body::before {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            background: radial-gradient(circle at center, rgba(0, 255, 255, 0.05) 0%, transparent 70%);
            z-index: -1;
        }

        /* Logo Alanı */
        .logo-container {
            margin-bottom: 30px;
        }

        .main-logo {
            font-size: 6rem;
            font-weight: 800;
            letter-spacing: -4px;
            text-transform: uppercase;
            background: linear-gradient(to bottom, #fff 0%, #444 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.1));
        }

        /* Access Button - FATBOK TV */
        .access-btn {
            background: transparent;
            color: var(--accent);
            padding: 25px 80px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 800;
            font-size: 2.5rem; /* Daha büyük ve net */
            text-transform: uppercase;
            letter-spacing: 5px;
            border: 2px solid var(--accent);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2), inset 0 0 10px rgba(0, 255, 255, 0.1);
        }

        .access-btn:hover {
            background: var(--accent);
            color: var(--bg);
            transform: scale(1.1);
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.6);
            letter-spacing: 8px;
        }

        /* Durum Çubuğu */
        .status {
            margin-top: 20px;
            font-family: 'VT323', monospace;
            color: #444;
            font-size: 1.2rem;
            letter-spacing: 2px;
        }

        .status span {
            color: #00ff00;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

    </style>
</head>
<body>

    <div class="logo-container">
        <div class="main-logo">FATBOK</div>
    </div>

    <a href="https://fatboktv.netlify.app" class="access-btn">
        FATBOK TV
    </a>

    <div class="status">SERVER STATUS: <span>ONLINE</span></div>

</body>
</html>
